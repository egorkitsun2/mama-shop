<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Экран покупателя</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-8 h-screen overflow-hidden">
    <div
      class="max-w-4xl mx-auto bg-white rounded-lg shadow-xl p-6 h-full flex flex-col"
    >
      <h1 class="text-4xl font-bold mb-6 text-center text-gray-800">
        Ваши покупки
      </h1>

      <div class="flex-grow overflow-auto mb-4 border-b">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-gray-200">
              <th class="p-4 text-2xl">Товар</th>
              <th class="p-4 text-2xl text-right">Цена (₸)</th>
            </tr>
          </thead>
          <tbody id="cart" class="text-3xl font-medium">
            <!-- Сюда прилетают товары с сервера -->
          </tbody>
        </table>
      </div>

      <div
        class="flex justify-between items-center bg-gray-800 text-white p-6 rounded"
      >
        <span class="text-4xl font-bold">ИТОГО:</span>
        <span id="total" class="text-6xl font-bold text-green-400">0 ₸</span>
      </div>
    </div>

    <script>
      function updateDisplay() {
        fetch("/api/cart")
          .then((res) => res.json())
          .then((data) => {
            const cartHtml = data.cart
              .map(
                (item) =>
                  `<tr class="border-b"><td class="p-4">${item.name}</td><td class="p-4 text-right">${item.price}</td></tr>`,
              )
              .join("");

            document.getElementById("cart").innerHTML = cartHtml;
            document.getElementById("total").innerText = data.total + " ₸";

            // Автопрокрутка списка вниз
            const cartBody = document.getElementById("cart");
            cartBody.parentElement.parentElement.scrollTop =
              cartBody.parentElement.parentElement.scrollHeight;
          })
          .catch((err) => console.error("Ошибка связи с сервером", err));
      }

      // Опрашиваем сервер каждую секунду
      setInterval(updateDisplay, 1000);
      updateDisplay();
    </script>
  </body>
</html>

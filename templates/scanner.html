<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сканер (Телефон)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-4">
      <h2 class="text-xl font-bold mb-4 text-center text-gray-800">
        Касса (Скан)
      </h2>
      <div id="reader" class="w-full mb-4 overflow-hidden rounded"></div>
      <div id="result" class="text-center font-bold text-lg text-blue-600 mb-4">
        Наведи камеру на штрихкод
      </div>
      <button
        id="rescan"
        class="w-full bg-blue-500 text-white py-2 rounded hidden mb-4"
        onclick="startScanner()"
      >
        Сканировать еще
      </button>
      <button
        id="clearCart"
        class="w-full bg-red-500 text-white py-3 rounded font-bold"
        onclick="clearCart()"
      >
        🗑 Новый покупатель (Очистить чек)
      </button>
    </div>

    <!-- Форма для нового товара (скрыта по умолчанию) -->
    <div
      id="newProductModal"
      class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden flex items-center justify-center p-4"
    >
      <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h3 class="text-xl font-bold mb-4">Новый товар</h3>
        <p id="newBarcodeLabel" class="text-gray-600 mb-4"></p>

        <input
          type="text"
          id="newName"
          placeholder="Название товара"
          class="w-full border p-2 mb-4 rounded text-lg"
        />
        <input
          type="number"
          id="newPrice"
          placeholder="Цена (₸)"
          class="w-full border p-2 mb-4 rounded text-lg"
        />

        <label class="block mb-2 font-bold text-gray-700"
          >Сделай фото (откроется камера):</label
        >
        <input
          type="file"
          id="newImage"
          accept="image/*"
          capture="environment"
          class="w-full mb-4 border p-2"
        />

        <div class="flex justify-between mt-4">
          <button
            onclick="closeModal()"
            class="bg-gray-400 text-white px-4 py-2 rounded font-bold"
          >
            Отмена
          </button>
          <button
            onclick="saveProduct()"
            class="bg-green-500 text-white px-4 py-2 rounded font-bold"
          >
            Сохранить
          </button>
        </div>
      </div>
    </div>

    <script>
      let currentBarcode = "";

      // Инициализируем сканер СТРОГО ОДИН РАЗ в глобальной области
      let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: { width: 250, height: 100 } },
        false,
      );

      function startScanner() {
        document.getElementById("rescan").classList.add("hidden");
        document.getElementById("result").innerText =
          "Наведи камеру на штрихкод";
        // Просто запускаем процесс сканирования
        html5QrcodeScanner.render(onScanSuccess);
      }

      function onScanSuccess(decodedText) {
        // Вырубаем считывание, чтобы не пикало 10 раз подряд
        html5QrcodeScanner.clear();

        fetch("/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ barcode: decodedText }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "found") {
              document.getElementById("result").innerHTML =
                `<span class="text-green-600">В чеке: ${data.name}</span>`;
              document.getElementById("rescan").classList.remove("hidden");
            } else {
              currentBarcode = decodedText;
              document.getElementById("newBarcodeLabel").innerText =
                "Штрихкод: " + decodedText;
              document
                .getElementById("newProductModal")
                .classList.remove("hidden");
            }
          });
      }

      function clearCart() {
        fetch("/api/cart/clear", { method: "POST" }).then(() => {
          document.getElementById("result").innerHTML =
            `<span class="text-red-500">Чек сброшен</span>`;
          if (!document.getElementById("rescan").classList.contains("hidden")) {
            startScanner();
          }
        });
      }

      function closeModal() {
        document.getElementById("newProductModal").classList.add("hidden");
        document.getElementById("newName").value = "";
        document.getElementById("newPrice").value = "";
        document.getElementById("newImage").value = "";
        startScanner();
      }

      function saveProduct() {
        const name = document.getElementById("newName").value;
        const price = document.getElementById("newPrice").value;
        const fileInput = document.getElementById("newImage");

        if (!name || !price) {
          alert("Заполни название и цену!");
          return;
        }

        const formData = new FormData();
        formData.append("barcode", currentBarcode);
        formData.append("name", name);
        formData.append("price", price);

        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          compressImage(file, 800, (compressedBlob) => {
            formData.append("image", compressedBlob, "photo.jpg");
            sendData(formData);
          });
        } else {
          sendData(formData);
        }
      }

      function compressImage(file, maxSize, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = function () {
            const canvas = document.createElement("canvas");
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxSize) {
                height *= maxSize / width;
                width = maxSize;
              }
            } else {
              if (height > maxSize) {
                width *= maxSize / height;
                height = maxSize;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
              (blob) => {
                callback(blob);
              },
              "image/jpeg",
              0.7,
            );
          };
        };
      }

      function sendData(formData) {
        fetch("/add", {
          method: "POST",
          body: formData,
        }).then(() => {
          closeModal();
          document.getElementById("result").innerHTML =
            `<span class="text-green-600">Добавлено: ${formData.get("name")}</span>`;
          document.getElementById("rescan").classList.remove("hidden");
        });
      }

      // Первичный запуск при открытии страницы
      startScanner();
    </script>
  </body>
</html>

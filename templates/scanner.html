<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сканер (Телефон)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-4 pb-12">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-4 mb-4">
      <h2 class="text-xl font-bold mb-4 text-center text-gray-800">
        Касса (Скан)
      </h2>
      <div id="reader" class="w-full mb-4 overflow-hidden rounded"></div>
      <div id="result" class="text-center font-bold text-lg text-blue-600 mb-4">
        Наведи камеру на штрихкод
      </div>
      <button
        id="rescan"
        class="w-full bg-blue-500 text-white py-2 rounded hidden mb-4 font-bold"
        onclick="startScanner()"
      >
        Сканировать еще
      </button>
      <button
        id="clearCart"
        class="w-full bg-red-500 text-white py-3 rounded font-bold"
        onclick="clearCart()"
      >
        🗑 Новый покупатель (Очистить чек)
      </button>
    </div>

    <!-- Блок управления открытым чеком -->
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-4">
      <div class="flex justify-between items-center mb-3 border-b pb-2">
        <h3 class="font-bold text-gray-800">Текущий чек</h3>
        <span id="scan-cart-total" class="font-bold text-green-600 text-lg"
          >0 ₸</span
        >
      </div>

      <div id="active-cart-list" class="space-y-2 max-h-60 overflow-y-auto">
        <p class="text-center text-gray-400 text-sm py-4">Чек пуст</p>
      </div>
    </div>

    <!-- Форма для нового товара -->
    <div
      id="newProductModal"
      class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden flex items-center justify-center p-4 z-50 overflow-y-auto"
    >
      <div class="bg-white rounded-lg p-6 w-full max-w-md my-8">
        <h3 class="text-xl font-bold mb-2">Новый товар</h3>
        <p
          id="newBarcodeLabel"
          class="text-gray-600 mb-4 font-mono text-sm"
        ></p>

        <input
          type="text"
          id="newName"
          placeholder="Название товара"
          class="w-full border p-2 mb-3 rounded text-base"
        />
        <input
          type="number"
          id="newPrice"
          placeholder="Цена (₸)"
          class="w-full border p-2 mb-3 rounded text-base"
        />

        <label class="block mb-1 text-xs font-bold text-gray-600 uppercase"
          >Категория:</label
        >
        <select
          id="newCategory"
          onchange="updateSubcategories()"
          class="w-full border p-2 mb-3 rounded text-base bg-white"
        >
          <option value="">-- Выберите категорию --</option>
        </select>

        <div id="subcatContainer" class="hidden">
          <label class="block mb-1 text-xs font-bold text-gray-600 uppercase"
            >Подкатегория:</label
          >
          <select
            id="newSubcategory"
            class="w-full border p-2 mb-3 rounded text-base bg-white"
          >
            <option value="">-- Выберите подкатегорию --</option>
          </select>
        </div>

        <label class="block mb-1 text-xs font-bold text-gray-600 uppercase"
          >Фото товара:</label
        >
        <input
          type="file"
          id="newImage"
          accept="image/*"
          class="w-full mb-4 border p-2 rounded text-sm"
        />

        <div class="flex justify-between mt-4 gap-2">
          <button
            onclick="closeModal()"
            class="w-1/2 bg-gray-400 text-white py-2 rounded font-bold"
          >
            Отмена
          </button>
          <button
            onclick="saveProduct()"
            class="w-1/2 bg-green-500 text-white py-2 rounded font-bold"
          >
            Сохранить
          </button>
        </div>
      </div>
    </div>

    <script>
      let currentBarcode = "";

      const categoriesData = {
        Алкоголь: [],
        Напитки: [],
        "Хоз. товары": [],
        Выпечка: [],
        Снеки: [],
        Приправы: [],
        Крупы: [],
        "Чай — Кофе": [],
        Специи: [],
        "Хлебобулочные изделия": [],
        "Молочная продукция": [
          "Молоко",
          "Кефир — Ряженка",
          "Йогурты",
          "Сметана",
          "Сыр",
        ],
        Полуфабрикаты: ["Пельмени", "Манты", "Вареники", "Котлеты", "Голубцы"],
        Сладости: ["Шоколад", "Жвачки", "Попкорн"],
        Мука: [],
        "Мучные изделия": [],
        "Макаронные изделия": [],
        Яйца: [],
        Мороженое: [],
        "Мясная продукция": [],
        "Консервированные товары": [],
        Масла: [],
        "Пищевая продукция (сода, соль, уксус)": [],
        Овощи: [],
        Прочее: [],
      };

      function initCategories() {
        const catSelect = document.getElementById("newCategory");
        catSelect.innerHTML = `<option value="">-- Выберите категорию --</option>`;
        Object.keys(categoriesData).forEach((cat) => {
          catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
        });
      }

      function updateSubcategories() {
        const catSelect = document.getElementById("newCategory");
        const subcatContainer = document.getElementById("subcatContainer");
        const subcatSelect = document.getElementById("newSubcategory");
        const selectedCat = catSelect.value;

        const subcats = categoriesData[selectedCat] || [];

        if (subcats.length > 0) {
          subcatSelect.innerHTML = `<option value="">-- Не выбрано --</option>`;
          subcats.forEach((sub) => {
            subcatSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
          });
          subcatContainer.classList.remove("hidden");
        } else {
          subcatContainer.classList.add("hidden");
          subcatSelect.innerHTML = `<option value="">-- Не выбрано --</option>`;
        }
      }

      let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: { width: 250, height: 100 } },
        false,
      );

      function startScanner() {
        document.getElementById("rescan").classList.add("hidden");
        document.getElementById("result").innerText =
          "Наведи камеру на штрихкод";
        html5QrcodeScanner.render(onScanSuccess);
      }

      function onScanSuccess(decodedText) {
        html5QrcodeScanner.clear();

        fetch("/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ barcode: decodedText }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "found") {
              document.getElementById("result").innerHTML =
                `<span class="text-green-600">В чеке: ${data.name} (×${data.qty})</span>`;
              document.getElementById("rescan").classList.remove("hidden");
              updateScannerCartUI();
            } else {
              currentBarcode = decodedText;
              document.getElementById("newBarcodeLabel").innerText =
                "Штрихкод: " + decodedText;
              document
                .getElementById("newProductModal")
                .classList.remove("hidden");
            }
          });
      }

      function updateScannerCartUI() {
        fetch("/api/cart")
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("scan-cart-total").innerText =
              data.total + " ₸";
            const listEl = document.getElementById("active-cart-list");

            if (data.cart.length === 0) {
              listEl.innerHTML = `<p class="text-center text-gray-400 text-sm py-4">Чек пуст</p>`;
              return;
            }

            listEl.innerHTML = data.cart
              .map(
                (item) => `
              <div class="flex items-center justify-between bg-gray-50 p-2 rounded border border-gray-200 text-sm">
                <div class="flex-grow pr-2">
                  <p class="font-semibold text-gray-800 leading-tight">${item.name}</p>
                  <p class="text-xs text-gray-500">${item.price} ₸ × ${item.qty} = <span class="font-bold text-gray-700">${item.price * item.qty} ₸</span></p>
                </div>
                <button 
                  onclick="removeFromCart('${item.barcode}')" 
                  class="bg-red-100 hover:bg-red-200 text-red-600 font-bold px-3 py-1.5 rounded transition-colors"
                >
                  -1
                </button>
              </div>
            `,
              )
              .join("");
          });
      }

      function removeFromCart(barcode) {
        fetch("/api/cart/remove", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ barcode: barcode }),
        }).then(() => updateScannerCartUI());
      }

      function clearCart() {
        fetch("/api/cart/clear", { method: "POST" }).then(() => {
          document.getElementById("result").innerHTML =
            `<span class="text-red-500">Чек сброшен</span>`;
          updateScannerCartUI();
          if (!document.getElementById("rescan").classList.contains("hidden")) {
            startScanner();
          }
        });
      }

      function closeModal() {
        document.getElementById("newProductModal").classList.add("hidden");
        document.getElementById("newName").value = "";
        document.getElementById("newPrice").value = "";
        document.getElementById("newImage").value = "";
        document.getElementById("newCategory").value = "";
        document.getElementById("subcatContainer").classList.add("hidden");
        startScanner();
      }

      function saveProduct() {
        const name = document.getElementById("newName").value;
        const price = document.getElementById("newPrice").value;
        const category =
          document.getElementById("newCategory").value || "Прочее";
        const subcategory =
          document.getElementById("newSubcategory").value || "";
        const fileInput = document.getElementById("newImage");

        if (!name || !price) {
          alert("Заполни название и цену!");
          return;
        }

        const formData = new FormData();
        formData.append("barcode", currentBarcode);
        formData.append("name", name);
        formData.append("price", price);
        formData.append("category", category);
        formData.append("subcategory", subcategory);

        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          compressImage(file, 800, (compressedBlob) => {
            formData.append("image", compressedBlob, "photo.jpg");
            sendData(formData);
          });
        } else {
          sendData(formData);
        }
      }

      function compressImage(file, maxSize, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = function () {
            const canvas = document.createElement("canvas");
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxSize) {
                height *= maxSize / width;
                width = maxSize;
              }
            } else {
              if (height > maxSize) {
                width *= maxSize / height;
                height = maxSize;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
              (blob) => {
                callback(blob);
              },
              "image/jpeg",
              0.7,
            );
          };
        };
      }

      function sendData(formData) {
        fetch("/add", {
          method: "POST",
          body: formData,
        }).then(() => {
          closeModal();
          document.getElementById("result").innerHTML =
            `<span class="text-green-600">Добавлено: ${formData.get("name")}</span>`;
          document.getElementById("rescan").classList.remove("hidden");
          updateScannerCartUI();
        });
      }

      initCategories();
      updateScannerCartUI();
      startScanner();
    </script>
  </body>
</html>

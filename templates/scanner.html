<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сканер (Телефон)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-4 pb-12">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-4 mb-4">
      <h2 class="text-xl font-bold mb-4 text-center text-gray-800">
        Касса (Скан)
      </h2>

      <!-- Панель режимов и выбора количества -->
      <div
        id="mode-bar"
        class="mb-4 p-2.5 bg-blue-50 border border-blue-200 rounded-lg transition-colors"
      >
        <div class="flex justify-between items-center mb-2">
          <div class="text-xs font-bold uppercase tracking-wide text-gray-600">
            Режим:
            <span id="mode-label" class="text-blue-600 font-extrabold"
              >ПРОДАЖА</span
            >
          </div>
          <!-- Поле ввода количества для опта/пакетов -->
          <div id="qty-container" class="flex items-center gap-1.5">
            <label
              for="scan-qty"
              class="text-xs font-bold text-gray-600 uppercase"
              >Кол-во:</label
            >
            <input
              type="number"
              id="scan-qty"
              value="1"
              min="1"
              max="999"
              class="w-16 p-1 text-xs border rounded font-bold text-center bg-white border-blue-300 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            />
          </div>
        </div>

        <div class="grid grid-cols-3 gap-1.5">
          <button
            id="btn-mode-sell"
            type="button"
            onclick="setMode('sell')"
            class="py-1.5 px-2 text-xs font-bold rounded bg-blue-600 text-white shadow-sm"
          >
            Продажа
          </button>
          <button
            id="btn-mode-add"
            type="button"
            onclick="setMode('add')"
            class="py-1.5 px-2 text-xs font-bold rounded bg-gray-200 text-gray-700 hover:bg-gray-300"
          >
            Добавка
          </button>
          <button
            id="btn-mode-edit"
            type="button"
            onclick="setMode('edit')"
            class="py-1.5 px-2 text-xs font-bold rounded bg-gray-200 text-gray-700 hover:bg-gray-300"
          >
            Редакт
          </button>
        </div>
      </div>

      <!-- Контейнер камеры -->
      <div
        id="reader"
        class="w-full mb-3 overflow-hidden rounded min-h-[250px] bg-gray-900"
      ></div>

      <!-- Кнопки ручного ввода -->
      <div class="grid grid-cols-2 gap-2 mb-3">
        <button
          type="button"
          onclick="manualInputCode()"
          class="bg-gray-700 text-white py-2 rounded font-bold text-xs hover:bg-gray-800 active:scale-95 transition-transform"
        >
          ⌨️ Ввести код
        </button>
        <button
          type="button"
          onclick="openModalForNoBarcode()"
          class="bg-amber-600 text-white py-2 rounded font-bold text-xs hover:bg-amber-700 active:scale-95 transition-transform"
        >
          ➕ Без штрихкода
        </button>
      </div>

      <div id="result" class="text-center font-bold text-lg text-blue-600 mb-2">
        Наведи камеру на штрихкод
      </div>

      <button
        id="rescan"
        class="w-full bg-blue-500 text-white py-2 rounded hidden mb-3 font-bold"
        onclick="startScanner()"
      >
        Сканировать еще
      </button>

      <!-- Панель утилит -->
      <div class="grid grid-cols-3 gap-1.5">
        <button
          id="clearCart"
          class="bg-red-500 text-white py-2.5 rounded font-bold text-xs active:scale-95 transition-transform"
          onclick="clearCart()"
        >
          🗑 Чек
        </button>
        <button
          class="bg-blue-600 text-white py-2.5 rounded font-bold text-xs active:scale-95 transition-transform"
          onclick="triggerBackup()"
        >
          💾 Бэкап
        </button>
        <button
          class="bg-gray-800 text-white py-2.5 rounded font-bold text-xs active:scale-95 transition-transform"
          onclick="triggerManualSync()"
        >
          🔄 Git
        </button>
      </div>
    </div>

    <!-- Чек -->
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-4">
      <div class="flex justify-between items-center mb-3 border-b pb-2">
        <h3 class="font-bold text-gray-800">Текущий чек</h3>
        <span id="scan-cart-total" class="font-bold text-green-600 text-lg"
          >0 ₸</span
        >
      </div>
      <div id="active-cart-list" class="space-y-2 max-h-60 overflow-y-auto">
        <p class="text-center text-gray-400 text-sm py-4">Чек пуст</p>
      </div>
    </div>

    <!-- Модалка добавления/редактирования -->
    <div
      id="newProductModal"
      class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden flex items-center justify-center p-4 z-50 overflow-y-auto"
    >
      <div class="bg-white rounded-lg p-6 w-full max-w-md my-8">
        <h3 id="modalTitle" class="text-xl font-bold mb-2">Новый товар</h3>
        <p
          id="newBarcodeLabel"
          class="text-gray-600 mb-4 font-mono text-sm"
        ></p>

        <input
          type="text"
          id="newName"
          placeholder="Название товара"
          class="w-full border p-2 mb-3 rounded text-base"
        />
        <!-- В модалку newProductModal добавляем поле старой цены под основной ценой -->
        <input
          type="number"
          id="newPrice"
          placeholder="Цена (₸)"
          class="w-full border p-2 mb-2 rounded text-base"
        />
        <input
          type="number"
          id="newOldPrice"
          placeholder="Старая цена / Без скидки (необязательно)"
          class="w-full border p-2 mb-3 rounded text-base bg-gray-50/50"
        />
        <input
          type="text"
          id="newVolumeWeight"
          placeholder="Объем / Вес (напр. 0.5 л, 250 г, 1 кг)"
          class="w-full border p-2 mb-3 rounded text-base"
        />

        <label class="block mb-1 text-xs font-bold text-gray-600 uppercase"
          >Категория:</label
        >
        <input
          list="categories-list"
          id="newCategory"
          placeholder="Поиск категории..."
          onchange="updateSubcategories()"
          class="w-full border p-2 mb-3 rounded text-base bg-white"
        />
        <datalist id="categories-list"></datalist>

        <div id="subcatContainer" class="hidden">
          <label class="block mb-1 text-xs font-bold text-gray-600 uppercase"
            >Подкатегория:</label
          >
          <input
            list="subcategories-list"
            id="newSubcategory"
            placeholder="Поиск подкатегории..."
            class="w-full border p-2 mb-3 rounded text-base bg-white"
          />
          <datalist id="subcategories-list"></datalist>
        </div>

        <label class="block mb-1 text-xs font-bold text-gray-600 uppercase"
          >Фото товара (ракурсы):</label
        >
        <div class="grid grid-cols-2 gap-2 mb-2">
          <label
            class="bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold p-2 rounded text-center border border-blue-200 cursor-pointer text-xs flex flex-col items-center justify-center"
          >
            <span>📷 Сделать фото</span>
            <input
              type="file"
              id="cameraInput"
              accept="image/*"
              capture="environment"
              multiple
              class="hidden"
              onchange="handleFileSelect(this)"
            />
          </label>
          <label
            class="bg-gray-50 hover:bg-gray-100 text-gray-600 font-semibold p-2 rounded text-center border border-gray-200 cursor-pointer text-xs flex flex-col items-center justify-center"
          >
            <span>🖼 Из галереи</span>
            <input
              type="file"
              id="galleryInput"
              accept="image/*"
              multiple
              class="hidden"
              onchange="handleFileSelect(this)"
            />
          </label>
        </div>

        <!-- Галерея снятых кадров с кнопками удаления -->
        <div id="fileNamePreview" class="mb-3"></div>

        <div class="flex justify-between mt-4 gap-2">
          <button
            onclick="closeModal()"
            class="w-1/2 bg-gray-400 text-white py-2 rounded font-bold"
          >
            Отмена
          </button>
          <button
            onclick="saveProduct()"
            class="w-1/2 bg-green-500 text-white py-2 rounded font-bold"
          >
            Сохранить
          </button>
        </div>
      </div>
    </div>

    <script>
      let currentBarcode = "";
      let lastScannedProduct = null;
      let selectedFiles = [];
      let currentMode = "sell";

      const modeConfigs = {
        sell: {
          label: "ПРОДАЖА",
          labelClass: "text-blue-600 font-extrabold",
          barClass:
            "mb-4 p-2.5 bg-blue-50 border border-blue-200 rounded-lg transition-colors",
          btnId: "btn-mode-sell",
          btnClass: "bg-blue-600 text-white",
        },
        add: {
          label: "ДОБАВЛЕНИЕ",
          labelClass: "text-amber-600 font-extrabold",
          barClass:
            "mb-4 p-2.5 bg-amber-50 border border-amber-200 rounded-lg transition-colors",
          btnId: "btn-mode-add",
          btnClass: "bg-amber-600 text-white",
        },
        edit: {
          label: "РЕДАКТИРОВАНИЕ",
          labelClass: "text-purple-600 font-extrabold",
          barClass:
            "mb-4 p-2.5 bg-purple-50 border border-purple-200 rounded-lg transition-colors",
          btnId: "btn-mode-edit",
          btnClass: "bg-purple-600 text-white",
        },
      };

      function setMode(mode) {
        if (!modeConfigs[mode]) return;
        currentMode = mode;

        const cfg = modeConfigs[mode];
        document.getElementById("mode-label").innerText = cfg.label;
        document.getElementById("mode-label").className = cfg.labelClass;
        document.getElementById("mode-bar").className = cfg.barClass;

        const qtyContainer = document.getElementById("qty-container");
        if (mode === "sell") {
          qtyContainer.classList.remove("hidden");
        } else {
          qtyContainer.classList.add("hidden");
        }

        ["sell", "add", "edit"].forEach((m) => {
          const btn = document.getElementById(modeConfigs[m].btnId);
          btn.className =
            m === mode
              ? `py-1.5 px-2 text-xs font-bold rounded shadow-sm ${cfg.btnClass}`
              : "py-1.5 px-2 text-xs font-bold rounded bg-gray-200 text-gray-700 hover:bg-gray-300";
        });

        document.getElementById("result").innerText =
          "Наведи камеру на штрихкод";
        html5QrcodeScanner
          .clear()
          .then(() => {
            startScanner();
          })
          .catch(() => {
            startScanner();
          });
      }

      const CATALOG_STRUCTURE = {
        Алкоголь: [
          "Пиво и слабоалкогольные",
          "Крепкий алкоголь",
          "Закуски к пиву",
        ],
        "Напитки, чай, кофе": [
          "Соки и газировка",
          "Вода и энергетики",
          "Чай и кофе",
        ],
        "Молочка и яйца": [
          "Молоко",
          "Кефир и ряженка",
          "Йогурты и сметана",
          "Сыр",
          "Яйца",
        ],
        "Мясо, колбасы, консервы": [
          "Колбасы и сосиски",
          "Мясная продукция",
          "Консервы",
          "Овощи",
        ],
        "Заморозка и полуфабрикаты": [
          "Пельмени и манты",
          "Вареники",
          "Котлеты и голубцы",
          "Мороженое",
        ],
        "Крупы, мука, масла, специи": [
          "Крупы",
          "Мука",
          "Макаронные изделия",
          "Растительные масла",
          "Приправы и специи",
        ],
        "Сладости и снеки": [
          "Шоколад и конфеты",
          "Жвачки",
          "Чипсы, сухарики, попкорн",
          "Печенье и выпечка",
        ],
        Хлеб: ["Хлебобулочные изделия"],
        "Бытовая химия и гигиена": [
          "Шампуни и дезодоранты",
          "Мыло и уход за собой",
          "Стиральные порошки и моющие",
          "Хозяйственные мелочи",
        ],
      };

      function initCategories() {
        const catList = document.getElementById("categories-list");
        catList.innerHTML = Object.keys(CATALOG_STRUCTURE)
          .map((cat) => `<option value="${cat}">`)
          .join("");
      }

      function updateSubcategories() {
        const selectedCat = document.getElementById("newCategory").value;
        const subContainer = document.getElementById("subcatContainer");
        const subList = document.getElementById("subcategories-list");

        const subcats = CATALOG_STRUCTURE[selectedCat] || [];
        if (subcats.length > 0) {
          subList.innerHTML = subcats
            .map((sub) => `<option value="${sub}">`)
            .join("");
          subContainer.classList.remove("hidden");
        } else {
          subContainer.classList.add("hidden");
        }
      }

      // Накапливаем снимки в массив и сбрасываем value инпута
      function handleFileSelect(input) {
        if (input.files && input.files.length > 0) {
          const newFiles = Array.from(input.files);
          selectedFiles = selectedFiles.concat(newFiles);
          input.value = "";
          updatePhotoPreview();
        }
      }

      // Отображаем миниатюры сделанных снимков с кнопкой '✕' на каждой
      function updatePhotoPreview() {
        const previewEl = document.getElementById("fileNamePreview");
        if (selectedFiles.length > 0) {
          const thumbsHtml = selectedFiles
            .map((file, idx) => {
              const url = URL.createObjectURL(file);
              return `
                <div class="relative w-12 h-12 rounded border border-gray-300 overflow-hidden flex-shrink-0 bg-gray-100">
                  <img src="${url}" class="w-full h-full object-cover">
                  <button 
                    type="button" 
                    onclick="removePhoto(${idx})" 
                    class="absolute top-0 right-0 bg-red-600 text-white text-[10px] w-4 h-4 flex items-center justify-center font-bold rounded-bl active:scale-90 transition-transform"
                  >✕</button>
                </div>
              `;
            })
            .join("");

          previewEl.innerHTML = `
            <div class="bg-gray-50 p-2 rounded border border-gray-200">
              <div class="flex justify-between items-center mb-1.5">
                <span class="text-xs font-bold text-gray-700">Снято кадров: ${selectedFiles.length}</span>
                <button type="button" onclick="resetPhotos()" class="text-[10px] font-bold text-red-500 hover:underline">Очистить всё</button>
              </div>
              <div class="flex gap-1.5 overflow-x-auto pb-1">
                ${thumbsHtml}
              </div>
            </div>
          `;
        } else {
          previewEl.innerHTML = "";
        }
      }

      function removePhoto(index) {
        selectedFiles.splice(index, 1);
        updatePhotoPreview();
      }

      function resetPhotos() {
        selectedFiles = [];
        updatePhotoPreview();
      }

      let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: { width: 250, height: 100 } },
        false,
      );

      function startScanner() {
        document.getElementById("rescan").classList.add("hidden");
        document.getElementById("result").innerText =
          "Наведи камеру на штрихкод";
        html5QrcodeScanner.render(onScanSuccess);
      }

      function manualInputCode() {
        const code = prompt("Введи штрихкод товара:");
        if (code && code.trim()) {
          onScanSuccess(code.trim());
        }
      }

      function openModalForNoBarcode() {
        currentMode = "add";
        setMode("add");
        currentBarcode = "";
        openModalForNew("");
      }

      function onScanSuccess(decodedText) {
        html5QrcodeScanner.clear();
        currentBarcode = decodedText;

        const qtyInput = document.getElementById("scan-qty");
        const qtyVal = parseInt(qtyInput ? qtyInput.value : "1") || 1;

        fetch("/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            barcode: decodedText,
            mode: currentMode,
            qty: qtyVal,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (currentMode === "sell") {
              if (data.status === "found") {
                lastScannedProduct = data;
                const totalAddedPrice = data.price * qtyVal;
                document.getElementById("result").innerHTML =
                  `<span class="text-green-600">В чеке: ${data.name} × ${qtyVal} (${totalAddedPrice} ₸)</span>`;
                updateScannerCartUI();
                if (qtyInput) qtyInput.value = 1;
              } else {
                lastScannedProduct = null;
                document.getElementById("result").innerHTML =
                  `<span class="text-red-500 font-bold">❌ Товар не найден в базе!</span>`;
              }
              document.getElementById("rescan").classList.remove("hidden");
            } else if (currentMode === "add") {
              if (data.status === "found") {
                document.getElementById("result").innerHTML =
                  `<span class="text-amber-600 font-bold">⚠️ Уже существует: ${data.name}</span>`;
                document.getElementById("rescan").classList.remove("hidden");
              } else {
                lastScannedProduct = null;
                openModalForNew(decodedText);
              }
            } else if (currentMode === "edit") {
              if (data.status === "found") {
                lastScannedProduct = data;
                openEditModalForCurrent();
              } else {
                lastScannedProduct = null;
                document.getElementById("result").innerHTML =
                  `<span class="text-red-500 font-bold">❌ Нечего редактировать: товар не найден</span>`;
                document.getElementById("rescan").classList.remove("hidden");
              }
            }
          })
          .catch(() => {
            document.getElementById("result").innerHTML =
              `<span class="text-red-500">Ошибка сети или сервера</span>`;
            document.getElementById("rescan").classList.remove("hidden");
          });
      }

      function openModalForNew(barcode) {
        document.getElementById("modalTitle").innerText = "Новый товар";
        document.getElementById("newBarcodeLabel").innerText = barcode
          ? "Штрихкод: " + barcode
          : "Штрихкод: [Автогенерация из названия]";
        document.getElementById("newName").value = "";
        document.getElementById("newPrice").value = "";
        document.getElementById("newVolumeWeight").value = "";
        document.getElementById("newCategory").value = "";
        document.getElementById("newSubcategory").value = "";
        document.getElementById("newOldPrice").value = "";

        selectedFiles = [];
        updatePhotoPreview();

        document.getElementById("newProductModal").classList.remove("hidden");
      }

      function openEditModalForCurrent() {
        if (!lastScannedProduct) return;
        document.getElementById("modalTitle").innerText =
          "Редактирование товара";
        document.getElementById("newBarcodeLabel").innerText =
          "Штрихкод: " + lastScannedProduct.barcode;
        document.getElementById("newName").value = lastScannedProduct.name;
        document.getElementById("newPrice").value = lastScannedProduct.price;
        document.getElementById("newVolumeWeight").value =
          lastScannedProduct.volume_weight || "";
        document.getElementById("newCategory").value =
          lastScannedProduct.category || "";
        updateSubcategories();
        document.getElementById("newSubcategory").value =
          lastScannedProduct.subcategory || "";
        document.getElementById("newOldPrice").value =
          lastScannedProduct.old_price || "";

        selectedFiles = [];
        const existingCount =
          (lastScannedProduct.images && lastScannedProduct.images.length) ||
          (lastScannedProduct.image ? 1 : 0);

        const previewEl = document.getElementById("fileNamePreview");
        if (existingCount > 0) {
          previewEl.innerHTML = `<p class="text-xs font-semibold text-green-600 mb-2">📷 В базе уже есть фото (${existingCount} шт.)</p>`;
        } else {
          previewEl.innerHTML = "";
        }

        document.getElementById("newProductModal").classList.remove("hidden");
      }

      function triggerBackup() {
        fetch("/api/backup", { method: "POST" })
          .then((res) => res.json())
          .then((data) => alert("💾 " + data.message))
          .catch(() => alert("Ошибка при создании бэкапа"));
      }

      function triggerManualSync() {
        fetch("/api/sync", { method: "POST" })
          .then((res) => res.json())
          .then((data) => alert("🚀 " + data.message))
          .catch(() => alert("Ошибка при запуске Git Push"));
      }

      function updateScannerCartUI() {
        fetch("/api/cart")
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("scan-cart-total").innerText =
              data.total + " ₸";
            const listEl = document.getElementById("active-cart-list");
            if (data.cart.length === 0) {
              listEl.innerHTML = `<p class="text-center text-gray-400 text-sm py-4">Чек пуст</p>`;
              return;
            }
            listEl.innerHTML = data.cart
              .map(
                (item) => `
              <div class="flex items-center justify-between bg-gray-50 p-2 rounded border border-gray-200 text-sm">
                <div class="flex-grow pr-2">
                  <p class="font-semibold text-gray-800 leading-tight">${item.name}</p>
                  <p class="text-xs text-gray-500">${item.price} ₸ × ${item.qty} = <span class="font-bold text-gray-700">${item.price * item.qty} ₸</span></p>
                </div>
                <button onclick="removeFromCart('${item.barcode}')" class="bg-red-100 hover:bg-red-200 text-red-600 font-bold px-3 py-1.5 rounded transition-colors">-1</button>
              </div>
            `,
              )
              .join("");
          });
      }

      function removeFromCart(barcode) {
        fetch("/api/cart/remove", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ barcode: barcode }),
        }).then(() => updateScannerCartUI());
      }

      function clearCart() {
        fetch("/api/cart/clear", { method: "POST" }).then(() => {
          document.getElementById("result").innerHTML =
            `<span class="text-red-500">Чек сброшен</span>`;
          updateScannerCartUI();
          if (!document.getElementById("rescan").classList.contains("hidden"))
            startScanner();
        });
      }

      function closeModal() {
        document.getElementById("newProductModal").classList.add("hidden");
        selectedFiles = [];
        updatePhotoPreview();
        startScanner();
      }

      function saveProduct() {
        const name = document.getElementById("newName").value;
        const price = document.getElementById("newPrice").value;
        const volumeWeight = document.getElementById("newVolumeWeight").value;
        const category =
          document.getElementById("newCategory").value || "Прочее";
        const subcategory =
          document.getElementById("newSubcategory").value || "";
        const oldPrice = document.getElementById("newOldPrice").value;
        formData.append("old_price", oldPrice);

        if (!name || !price) {
          alert("Заполни название и цену!");
          return;
        }

        const formData = new FormData();
        formData.append("barcode", currentBarcode);
        formData.append("name", name);
        formData.append("price", price);
        formData.append("volume_weight", volumeWeight);
        formData.append("category", category);
        formData.append("subcategory", subcategory);

        if (selectedFiles.length > 0) {
          selectedFiles.forEach((file) => {
            formData.append("images", file);
          });
        }

        fetch("/add", { method: "POST", body: formData })
          .then((res) => res.json())
          .then((data) => {
            closeModal();
            document.getElementById("result").innerHTML =
              `<span class="text-green-600">Обновлено/Добавлено: ${name} (Код: ${data.barcode})</span>`;
            document.getElementById("rescan").classList.remove("hidden");
            updateScannerCartUI();
          });
      }

      initCategories();
      updateScannerCartUI();
      startScanner();
    </script>
  </body>
</html>

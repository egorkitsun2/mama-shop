<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мамин Магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans min-h-screen pb-24">
    <!-- Шапка -->
    <header class="bg-white shadow-sm p-4 sticky top-0 z-40">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold text-green-600">Продукты у Валентины</h1>
        <div class="text-xs text-gray-500 text-right">
          <p>с. Иртышск</p>
          <p>8:00 — 21:00</p>
        </div>
      </div>
    </header>

    <!-- Основной контент  -->
    <main class="max-w-4xl mx-auto p-4 w-full">
      <h2 class="text-2xl font-bold mb-4 text-gray-800">Каталог товаров</h2>

      <!-- Поиск и двухуровневый каталог -->
      <div class="mb-6 space-y-3">
        <input
          type="search"
          id="search-input"
          placeholder="Поиск товара (например: орб, пельмени, молоко)..."
          oninput="filterProducts()"
          class="w-full p-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-white"
        />

        <!-- Главные категории (Уровень 1) -->
        <nav
          id="categories-nav"
          class="flex gap-2 overflow-x-auto pb-1"
          aria-label="Категории товаров"
        ></nav>

        <!-- Подкатегории (Уровень 2) -->
        <nav
          id="subcategories-nav"
          class="flex gap-2 overflow-x-auto pb-1 hidden"
          aria-label="Подкатегории товаров"
        ></nav>
      </div>

      <!-- Сетка каталога -->
      <ul id="catalog" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
        <li class="animate-pulse bg-gray-300 h-48 rounded-lg"></li>
        <li class="animate-pulse bg-gray-300 h-48 rounded-lg"></li>
      </ul>
    </main>

    <!-- Корзина -->
    <div
      id="cart-bar"
      class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] p-4 transform translate-y-full transition-transform duration-300 z-50"
    >
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
          <p class="text-xs text-gray-500">Сумма заказа:</p>
          <p id="cart-total" class="font-bold text-xl text-gray-800">0 ₸</p>
        </div>
        <button
          onclick="checkout()"
          class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition-colors"
        >
          Оформить
        </button>
      </div>
    </div>

    <script>
      let cart = {};
      let productsData = [];
      let activeCategory = "all";
      let activeSubcategory = "all";

      // Структура каталога с листочка
      const CATALOG_STRUCTURE = {
        Алкоголь: [
          "Пиво и слабоалкогольные",
          "Крепкий алкоголь",
          "Закуски к пиву",
        ],
        "Напитки, чай, кофе": [
          "Соки и газировка",
          "Вода и энергетики",
          "Чай и кофе",
        ],
        "Молочка и яйца": [
          "Молоко",
          "Кефир и ряженка",
          "Йогурты и сметана",
          "Сыр",
          "Яйца",
        ],
        "Мясо, колбасы, консервы": [
          "Колбасы и сосиски",
          "Мясная продукция",
          "Консервы",
          "Овощи",
        ],
        "Заморозка и полуфабрикаты": [
          "Пельмени и манты",
          "Вареники",
          "Котлеты и голубцы",
          "Мороженое",
        ],
        "Крупы, мука, масла, специи": [
          "Крупы",
          "Мука",
          "Макаронные изделия",
          "Растительные масла",
          "Приправы и специи",
          "Сода, соль, уксус",
        ],
        "Сладости и снеки": [
          "Шоколад и конфеты",
          "Жвачки",
          "Чипсы, сухарики, попкорн",
          "Печенье и выпечка",
        ],
        Хлеб: ["Хлебобулочные изделия"],
        "Бытовая химия и гигиена": [
          "Шампуни и дезодоранты",
          "Мыло и уход за собой",
          "Стирочные порошки и моющие",
          "Хозяйственные мелочи",
        ],
      };

      async function loadProducts() {
        try {
          const response = await fetch("products.json");
          if (!response.ok) throw new Error("Не удалось прочитать JSON");
          productsData = await response.json();

          renderCategories();
          filterProducts();
        } catch (error) {
          document.getElementById("catalog").innerHTML =
            `<p class="col-span-full text-center text-red-500 py-8">Ошибка: ${error.message}</p>`;
        }
      }

      function translit(str) {
        const ru = "абвгдеёжзийклмнопрстуфхцчшщъыьэюя";
        const en = [
          "a",
          "b",
          "v",
          "g",
          "d",
          "e",
          "yo",
          "zh",
          "z",
          "i",
          "y",
          "k",
          "l",
          "m",
          "n",
          "o",
          "p",
          "r",
          "s",
          "t",
          "u",
          "f",
          "h",
          "ts",
          "ch",
          "sh",
          "shch",
          "",
          "y",
          "",
          "e",
          "yu",
          "ya",
        ];
        let result = str.toLowerCase();
        for (let i = 0; i < ru.length; i++) {
          result = result.split(ru[i]).join(en[i]);
        }
        return result;
      }

      function renderCategories() {
        const categoriesNav = document.getElementById("categories-nav");
        const availableCategories = ["all", ...Object.keys(CATALOG_STRUCTURE)];

        categoriesNav.innerHTML = availableCategories
          .map(
            (cat) => `
                  <button
                    onclick="setCategory('${cat}')"
                    class="px-3.5 py-1.5 text-xs font-semibold rounded-full whitespace-nowrap border transition-colors ${
                      cat === activeCategory
                        ? "bg-green-600 text-white border-green-600"
                        : "bg-white text-gray-600 border-gray-300 hover:bg-gray-50"
                    }"
                  >
                    ${cat === "all" ? "Все товары" : cat}
                  </button>
                `,
          )
          .join("");

        renderSubcategories();
      }

      function renderSubcategories() {
        const subNav = document.getElementById("subcategories-nav");

        if (activeCategory === "all" || !CATALOG_STRUCTURE[activeCategory]) {
          subNav.classList.add("hidden");
          activeSubcategory = "all";
          return;
        }

        const subcats = CATALOG_STRUCTURE[activeCategory];
        subNav.classList.remove("hidden");

        const allSubcats = ["all", ...subcats];

        subNav.innerHTML = allSubcats
          .map(
            (sub) => `
                <button
                  onclick="setSubcategory('${sub}')"
                  class="px-2.5 py-1 text-[11px] font-medium rounded-full whitespace-nowrap border transition-colors ${
                    sub === activeSubcategory
                      ? "bg-gray-800 text-white border-gray-800"
                      : "bg-gray-100 text-gray-600 border-gray-200 hover:bg-gray-200"
                  }"
                >
                  ${sub === "all" ? "Все подкатегории" : sub}
                </button>
              `,
          )
          .join("");
      }

      function setCategory(cat) {
        activeCategory = cat;
        activeSubcategory = "all";
        renderCategories();
        filterProducts();
      }

      function setSubcategory(sub) {
        activeSubcategory = sub;
        renderSubcategories();
        filterProducts();
      }

      function filterProducts() {
        const rawQuery = document
          .getElementById("search-input")
          .value.toLowerCase()
          .trim();
        const queryTranslit = translit(rawQuery);

        const filtered = productsData.filter((item) => {
          const catName = item.category || "Прочее";
          const subName = item.subcategory || "";

          const matchesCat =
            activeCategory === "all" || catName === activeCategory;
          const matchesSubcat =
            activeSubcategory === "all" || subName === activeSubcategory;

          const nameLower = item.name.toLowerCase();
          const nameTranslit = translit(nameLower);

          const matchesSearch =
            !rawQuery ||
            nameLower.includes(rawQuery) ||
            nameTranslit.includes(rawQuery) ||
            nameLower.includes(queryTranslit) ||
            item.barcode.includes(rawQuery);

          return matchesCat && matchesSubcat && matchesSearch;
        });

        renderCatalog(filtered);
      }

      function renderCatalog(items) {
        const catalog = document.getElementById("catalog");

        if (items.length === 0) {
          catalog.innerHTML = `<p class="col-span-full text-center text-gray-500 py-8">Товары в этой категории не найдены</p>`;
          return;
        }

        catalog.innerHTML = items
          .map(
            (item) => `
                <li>
                  <article class="bg-white rounded-lg shadow-sm p-3 flex flex-col justify-between hover:-translate-y-1 hover:shadow-md transition-all duration-300 border border-gray-100 h-full">
                    <div class="flex-grow">
                      ${
                        item.image
                          ? `<img src="static/img/${item.image}" alt="${item.name}" class="w-full h-32 object-cover rounded-md mb-2">`
                          : `<div class="w-full h-32 bg-gray-100 rounded-md mb-2 flex items-center justify-center text-gray-400 text-xs text-center p-2 border border-dashed border-gray-300">Нет фото</div>`
                      }
                      <div class="flex flex-wrap gap-1 mb-1">
                        <span class="text-[10px] font-semibold bg-green-50 text-green-700 px-1.5 py-0.5 rounded">${item.category || "Прочее"}</span>
                        ${item.subcategory ? `<span class="text-[10px] font-semibold bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded">${item.subcategory}</span>` : ""}
                      </div>
                      <h3 class="font-semibold text-sm text-gray-800 leading-tight">${item.name}</h3>
                      <p class="text-xs text-gray-400 mt-1">Код: ${item.barcode}</p>
                      <p class="text-green-600 font-bold mt-1 text-base">${item.price} ₸</p>
                    </div>
                    <div class="mt-3 flex items-center justify-between bg-gray-50 rounded-lg p-1 border border-gray-200">
                      <button onclick="addToCart('${item.barcode}', -1)" class="w-8 h-8 flex items-center justify-center text-gray-600 font-bold hover:bg-gray-200 rounded transition-colors">-</button>
                      <span id="qty-${item.barcode}" class="text-sm font-bold text-gray-800 w-6 text-center">${cart[item.barcode]?.qty || 0}</span>
                      <button onclick="addToCart('${item.barcode}', 1)" class="w-8 h-8 flex items-center justify-center text-green-600 font-bold hover:bg-green-100 rounded transition-colors">+</button>
                    </div>
                  </article>
                </li>
              `,
          )
          .join("");
      }

      function addToCart(barcode, change) {
        const product = productsData.find((p) => p.barcode === barcode);
        if (!product) return;

        if (!cart[barcode])
          cart[barcode] = { name: product.name, price: product.price, qty: 0 };

        cart[barcode].qty += change;
        if (cart[barcode].qty <= 0) delete cart[barcode];

        const qtyElement = document.getElementById(`qty-${barcode}`);
        if (qtyElement)
          qtyElement.innerText = cart[barcode] ? cart[barcode].qty : 0;

        updateCartUI();
      }

      function updateCartUI() {
        const cartBar = document.getElementById("cart-bar");
        const totalEl = document.getElementById("cart-total");

        let total = 0;
        let count = 0;

        for (let id in cart) {
          total += cart[id].price * cart[id].qty;
          count += cart[id].qty;
        }

        totalEl.innerText = `${total} ₸`;

        if (count > 0) {
          cartBar.classList.remove("translate-y-full");
        } else {
          cartBar.classList.add("translate-y-full");
        }
      }

      function checkout() {
        const phone = "77779409625";
        let text = "Здравствуйте! Мой заказ:\n\n";
        let total = 0;

        for (let id in cart) {
          const item = cart[id];
          text += `— ${item.name} (${item.qty} шт.) = ${item.price * item.qty} ₸\n`;
          total += item.price * item.qty;
        }

        text += `\nИтого к оплате: ${total} ₸`;

        window.open(
          `https://wa.me/${phone}?text=${encodeURIComponent(text)}`,
          "_blank",
        );
      }

      loadProducts();
    </script>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мамин Магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans min-h-screen pb-24">
    <!-- Отступ под корзину -->

    <!-- Шапка -->
    <header class="bg-white shadow-sm p-4 sticky top-0 z-40">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold text-green-600">Продукты у Валентины</h1>
        <div class="text-xs text-gray-500 text-right">
          <p>с. Иртышск</p>
          <p>8:00 — 21:00</p>
        </div>
      </div>
    </header>

    <!-- Основной контент -->
    <main class="max-w-4xl mx-auto p-4 w-full">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">Каталог товаров</h2>
      <div id="catalog" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
        <!-- Скелетон загрузки -->
        <div class="animate-pulse bg-gray-300 h-48 rounded-lg"></div>
        <div class="animate-pulse bg-gray-300 h-48 rounded-lg"></div>
        <div class="animate-pulse bg-gray-300 h-48 rounded-lg"></div>
      </div>
    </main>

    <!-- Корзина (всплывает снизу) -->
    <div
      id="cart-bar"
      class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] p-4 transform translate-y-full transition-transform duration-300 z-50"
    >
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
          <p class="text-xs text-gray-500">Сумма заказа:</p>
          <p id="cart-total" class="font-bold text-xl text-gray-800">0 ₸</p>
        </div>
        <button
          onclick="checkout()"
          class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition-colors"
        >
          Оформить
        </button>
      </div>
    </div>

    <script>
      let cart = {};
      let productsData = [];

      async function loadProducts() {
        try {
          const response = await fetch("mama-shop/products.json");
          if (!response.ok) throw new Error("Не удалось прочитать JSON");
          productsData = await response.json();

          const catalog = document.getElementById("catalog");
          catalog.innerHTML = productsData
            .map(
              (item) => `
                    <div class="bg-white rounded-lg shadow-sm p-3 flex flex-col justify-between hover:-translate-y-1 hover:shadow-md transition-all duration-300 border border-gray-100">
                        <div class="flex-grow">
                            <h3 class="font-semibold text-sm text-gray-800 leading-tight">${item.name}</h3>
                            <p class="text-xs text-gray-400 mt-1">Код: ${item.barcode}</p>
                            <p class="text-green-600 font-bold mt-1 text-base">${item.price} ₸</p>
                        </div>
                        <div class="mt-3 flex items-center justify-between bg-gray-50 rounded-lg p-1 border border-gray-200">
                            <button onclick="addToCart('${item.barcode}', -1)" class="w-8 h-8 flex items-center justify-center text-gray-600 font-bold hover:bg-gray-200 rounded transition-colors">-</button>
                            <span id="qty-${item.barcode}" class="text-sm font-bold text-gray-800 w-6 text-center">0</span>
                            <button onclick="addToCart('${item.barcode}', 1)" class="w-8 h-8 flex items-center justify-center text-green-600 font-bold hover:bg-green-100 rounded transition-colors">+</button>
                        </div>
                    </div>
                `,
            )
            .join("");
        } catch (error) {
          document.getElementById("catalog").innerHTML =
            `<p class="col-span-full text-center text-red-500 py-8">Ошибка: ${error.message}</p>`;
        }
      }

      function addToCart(barcode, change) {
        const product = productsData.find((p) => p.barcode === barcode);
        if (!product) return;

        if (!cart[barcode])
          cart[barcode] = { name: product.name, price: product.price, qty: 0 };

        cart[barcode].qty += change;
        if (cart[barcode].qty <= 0) delete cart[barcode];

        const qtyElement = document.getElementById(`qty-${barcode}`);
        if (qtyElement)
          qtyElement.innerText = cart[barcode] ? cart[barcode].qty : 0;

        updateCartUI();
      }

      function updateCartUI() {
        const cartBar = document.getElementById("cart-bar");
        const totalEl = document.getElementById("cart-total");

        let total = 0;
        let count = 0;

        for (let id in cart) {
          total += cart[id].price * cart[id].qty;
          count += cart[id].qty;
        }

        totalEl.innerText = `${total} ₸`;

        if (count > 0) {
          cartBar.classList.remove("translate-y-full");
        } else {
          cartBar.classList.add("translate-y-full");
        }
      }

      function checkout() {
        const phone = "77779409625"; // ЗАМЕНИ НА МАМИН НОМЕР
        let text = "Здравствуйте! Мой заказ:\n\n";
        let total = 0;

        for (let id in cart) {
          const item = cart[id];
          text += `— ${item.name} (${item.qty} шт.) = ${item.price * item.qty} ₸\n`;
          total += item.price * item.qty;
        }

        text += `\nИтого к оплате: ${total} ₸`;

        window.open(
          `https://wa.me/${phone}?text=${encodeURIComponent(text)}`,
          "_blank",
        );
      }

      loadProducts();
    </script>
  </body>
</html>
